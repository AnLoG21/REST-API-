
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: organizations_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@host.docker.internal:5433/organizations_db
      API_KEY: test-api-key-12345
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -exc "alembic upgrade head &&
      python -m app.scripts.init_db &&
      exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --log-level debug"

volumes:
  postgres_data:

